openapi: "3.0.3"
info:
  title: StableRoute Backend
  version: "1.0.0"
  description: |
    StableRoute API gateway — routing engine and pricing service for Stellar-based
    stablecoin payments. Provides pair registration, quote generation, webhook
    management, API-key lifecycle, and operational endpoints (health, metrics,
    audit log).

servers:
  - url: http://localhost:3001
    description: Local development

components:
  securitySchemes:
    ApiKeyBearer:
      type: http
      scheme: bearer
      bearerFormat: srk_<uuid-hex>
      description: |
        Bearer token issued by POST /api/v1/api-keys. Pass as
        `Authorization: Bearer srk_...`. Required for write operations.
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: srk_<uuid-hex>
      description: |
        Bearer token that carries the `keys:admin` scope. Required for
        admin-level operations such as key rotation and scope management.

  schemas:
    ErrorEnvelope:
      type: object
      required: [error, message, requestId]
      properties:
        error:
          type: string
          enum:
            - not_found
            - invalid_request
            - invalid_json
            - unauthorized
            - forbidden
            - rate_limited
            - service_paused
            - internal_error
            - not_acceptable
            - payload_too_large
            - conflict
            - method_not_allowed
            - read_only_mode
        message:
          type: string
        requestId:
          type: string

    AssetCode:
      type: string
      pattern: "^[A-Z0-9]{1,12}$"
      example: USDC

    PairMeta:
      type: object
      properties:
        liquidity:
          type: string
          description: Non-negative integer string representing available liquidity.
          example: "1000000"
        minAmount:
          type: string
          description: Minimum swap amount (integer string, 0 = unset).
          example: "100"
        maxAmount:
          type: string
          description: Maximum swap amount (positive integer string).
          example: "1000000"
        feeBps:
          type: integer
          minimum: 0
          maximum: 1000
          description: Fee in basis points (0–1000).
          example: 30
        rate:
          type: string
          pattern: "^[0-9]+(\\.[0-9]{1,8})?$"
          description: Per-pair base quote rate, returned as estimated_rate.
          example: "0.85"

    ApiKeyRecord:
      type: object
      required: [prefix, label, createdAt]
      properties:
        prefix:
          type: string
          description: First 8 characters of the raw key (safe to expose).
        label:
          type: string
        createdAt:
          type: integer
          description: Unix epoch ms.
        rotatedAt:
          type: integer
          description: Unix epoch ms when the key was rotated (only on predecessor records).

    WebhookRecord:
      type: object
      required: [id, url, events, createdAt]
      properties:
        id:
          type: string
          example: wh_a1b2c3d4e5f6g7h8
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
          example: ["pair.registered", "pair.unregistered"]
        createdAt:
          type: integer
          description: Unix epoch ms.

paths:
  /health:
    get:
      summary: Shallow health
      description: Liveness probe. Returns 200 while the process is alive.
      operationId: getHealth
      responses:
        "200":
          description: Service is alive.
          content:
            application/json:
              schema:
                type: object
                required: [status, service]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: stableroute-backend

  /api/v1/health/deep:
    get:
      summary: Deep health
      description: Readiness probe that runs storage and clock checks.
      operationId: getHealthDeep
      responses:
        "200":
          description: All checks passed.
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status:
                    type: string
                    enum: [ok, degraded, paused]
                  uptimeSeconds:
                    type: integer
                  memory:
                    type: object
                    properties:
                      rssMb:
                        type: integer
                      heapUsedMb:
                        type: integer
                  pid:
                    type: integer
                  node:
                    type: string
                  checks:
                    type: array
                    items:
                      type: object
                      required: [name, status, durationMs]
                      properties:
                        name:
                          type: string
                        status:
                          type: string
                          enum: [ok, fail]
                        durationMs:
                          type: integer
        "503":
          description: One or more checks degraded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/version:
    get:
      summary: Build / version metadata
      operationId: getVersion
      responses:
        "200":
          description: Build identity (no secrets or internal paths).
          content:
            application/json:
              schema:
                type: object
                required: [name, version, commit, buildTime, node]
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  commit:
                    type: string
                  buildTime:
                    type: string
                  node:
                    type: string

  /api/v1/openapi.json:
    get:
      summary: This OpenAPI spec (JSON)
      operationId: getOpenApiSpec
      responses:
        "200":
          description: OpenAPI 3.0 document as JSON.

  /api/v1/metrics:
    get:
      summary: Prometheus metrics
      description: Returns Prometheus text-exposition metrics (text/plain).
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus scrape payload.
          content:
            text/plain:
              schema:
                type: string

  /api/v1/stats:
    get:
      summary: Aggregate snapshot
      operationId: getStats
      responses:
        "200":
          description: Aggregate counts across all stores.
          content:
            application/json:
              schema:
                type: object
                required:
                  - totalPairs
                  - paused
                  - totalApiKeys
                  - totalWebhooks
                  - totalEvents
                  - pairsWithFee
                  - distinctAssets
                properties:
                  totalPairs:
                    type: integer
                  paused:
                    type: boolean
                  totalApiKeys:
                    type: integer
                  totalWebhooks:
                    type: integer
                  totalEvents:
                    type: integer
                  pairsWithFee:
                    type: integer
                  distinctAssets:
                    type: integer

  /api/v1/events:
    get:
      summary: Audit log
      operationId: getEvents
      parameters:
        - name: since
          in: query
          description: Return only events with ts >= since (Unix epoch ms).
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          description: Maximum number of events to return (clamped to log cap).
          schema:
            type: integer
            minimum: 1
            default: 100
        - name: type
          in: query
          description: Filter by event type.
          schema:
            type: string
      responses:
        "200":
          description: Filtered event list.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [ts, type]
                      properties:
                        ts:
                          type: integer
                        type:
                          type: string
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/config:
    get:
      summary: Read config
      operationId: getConfig
      responses:
        "200":
          description: Current runtime configuration.
          content:
            application/json:
              schema:
                type: object
                required: [config]
                properties:
                  config:
                    type: object
    patch:
      summary: Update config
      operationId: patchConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rateLimitPerWindow:
                  type: integer
                  minimum: 1
                rateLimitWindowMs:
                  type: integer
                  minimum: 1
                bulkMaxItems:
                  type: integer
                  minimum: 1
                eventLogCap:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Updated configuration.
          content:
            application/json:
              schema:
                type: object
                required: [config]
                properties:
                  config:
                    type: object
        "400":
          description: Invalid field value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs:
    get:
      summary: List pairs
      operationId: listPairs
      responses:
        "200":
          description: All registered pairs.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [pairs]
                properties:
                  pairs:
                    type: array
                    items:
                      type: object
                      required: [source, destination]
                      properties:
                        source:
                          $ref: "#/components/schemas/AssetCode"
                        destination:
                          $ref: "#/components/schemas/AssetCode"
        "304":
          description: Not modified (ETag matched).
    head:
      summary: Pairs list ETag (no body)
      operationId: headPairs
      responses:
        "200":
          description: Headers only (ETag + Content-Length).
        "304":
          description: Not modified.
    post:
      summary: Register pair
      operationId: registerPair
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source, destination]
              properties:
                source:
                  $ref: "#/components/schemas/AssetCode"
                destination:
                  $ref: "#/components/schemas/AssetCode"
      responses:
        "201":
          description: Pair registered (new).
          content:
            application/json:
              schema:
                type: object
        "200":
          description: Pair already existed (idempotent re-register).
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid asset codes or same-asset pair.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/bulk:
    post:
      summary: Bulk register pairs
      operationId: bulkRegisterPairs
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pairs]
              properties:
                pairs:
                  type: array
                  items:
                    type: object
                    required: [source, destination]
                    properties:
                      source:
                        $ref: "#/components/schemas/AssetCode"
                      destination:
                        $ref: "#/components/schemas/AssetCode"
      responses:
        "200":
          description: Per-item results.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
        "400":
          description: Batch too large or empty.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    get:
      summary: Read pair
      operationId: getPair
      responses:
        "200":
          description: Pair found.
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Pair not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      summary: Unregister pair
      operationId: deletePair
      security:
        - ApiKeyBearer: [pairs:write]
      responses:
        "204":
          description: Pair deleted.
        "404":
          description: Pair not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}/info:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    get:
      summary: Pair aggregate
      operationId: getPairInfo
      responses:
        "200":
          description: Pair metadata aggregate.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PairMeta"
                  - type: object
                    required: [source, destination, registered]
                    properties:
                      source:
                        $ref: "#/components/schemas/AssetCode"
                      destination:
                        $ref: "#/components/schemas/AssetCode"
                      registered:
                        type: boolean

  /api/v1/pairs/{source}/{destination}/fee_bps:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    patch:
      summary: Set fee
      operationId: patchPairFee
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feeBps]
              properties:
                feeBps:
                  type: integer
                  minimum: 0
                  maximum: 1000
      responses:
        "200":
          description: Updated pair metadata.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid feeBps value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}/min:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    patch:
      summary: Set min amount
      operationId: patchPairMin
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [minAmount]
              properties:
                minAmount:
                  type: string
                  pattern: "^[0-9]{1,39}$"
      responses:
        "200":
          description: Updated pair metadata.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid minAmount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}/max:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    patch:
      summary: Set max amount
      operationId: patchPairMax
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [maxAmount]
              properties:
                maxAmount:
                  type: string
                  pattern: "^[1-9][0-9]{0,38}$"
      responses:
        "200":
          description: Updated pair metadata.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid maxAmount.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}/liquidity:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    patch:
      summary: Set liquidity
      operationId: patchPairLiquidity
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [liquidity]
              properties:
                liquidity:
                  type: string
                  pattern: "^[0-9]{1,39}$"
      responses:
        "200":
          description: Updated pair metadata.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid liquidity value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}/rate:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    patch:
      summary: Set base rate
      operationId: patchPairRate
      security:
        - ApiKeyBearer: [pairs:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rate]
              properties:
                rate:
                  type: string
                  pattern: "^[0-9]+(\\.[0-9]{1,8})?$"
                  example: "0.85"
      responses:
        "200":
          description: Updated pair metadata.
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid rate value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/pairs/{source}/{destination}/reset:
    parameters:
      - name: source
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
      - name: destination
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/AssetCode"
    post:
      summary: Reset pair metadata to defaults
      operationId: resetPairMeta
      security:
        - ApiKeyBearer: [pairs:write]
      responses:
        "200":
          description: Pair metadata reset to factory defaults.
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Pair not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/quote:
    get:
      summary: Get a route quote
      operationId: getQuote
      parameters:
        - name: source_asset
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AssetCode"
        - name: dest_asset
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AssetCode"
        - name: amount
          in: query
          required: true
          description: Gross amount in base units (positive integer string).
          schema:
            type: string
            pattern: "^[1-9][0-9]{0,38}$"
      responses:
        "200":
          description: Quote with fee breakdown.
          content:
            application/json:
              schema:
                type: object
                required:
                  - source_asset
                  - dest_asset
                  - amount
                  - estimated_rate
                  - route
                  - feeBps
                  - feeAmount
                  - netAmount
                properties:
                  source_asset:
                    $ref: "#/components/schemas/AssetCode"
                  dest_asset:
                    $ref: "#/components/schemas/AssetCode"
                  amount:
                    type: string
                  estimated_rate:
                    type: string
                  route:
                    type: array
                    items:
                      type: string
                  feeBps:
                    type: integer
                  feeAmount:
                    type: string
                  netAmount:
                    type: string
        "400":
          description: Missing or invalid query params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/quote/reverse:
    get:
      summary: "Reverse quote: solve required input for a target output"
      operationId: getReverseQuote
      parameters:
        - name: source_asset
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AssetCode"
        - name: dest_asset
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/AssetCode"
        - name: output
          in: query
          required: true
          description: Target delivered amount in base units.
          schema:
            type: string
            pattern: "^[1-9][0-9]{0,38}$"
      responses:
        "200":
          description: Required gross input to deliver the requested output.
          content:
            application/json:
              schema:
                type: object
                required:
                  - source_asset
                  - dest_asset
                  - output
                  - requiredInput
                  - feeAmount
                  - feeBps
                  - route
                properties:
                  source_asset:
                    $ref: "#/components/schemas/AssetCode"
                  dest_asset:
                    $ref: "#/components/schemas/AssetCode"
                  output:
                    type: string
                  requiredInput:
                    type: string
                  feeAmount:
                    type: string
                  feeBps:
                    type: integer
                  route:
                    type: array
                    items:
                      type: string
        "400":
          description: Missing or invalid query params.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/quote/bulk:
    post:
      summary: Bulk quote
      operationId: bulkQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [source_asset, dest_asset, amount]
                    properties:
                      source_asset:
                        $ref: "#/components/schemas/AssetCode"
                      dest_asset:
                        $ref: "#/components/schemas/AssetCode"
                      amount:
                        type: string
      responses:
        "200":
          description: Per-item quote results.
          content:
            application/json:
              schema:
                type: object
                required: [results]
                properties:
                  results:
                    type: array
                    items:
                      type: object
        "400":
          description: Batch size out of range.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/api-keys:
    get:
      summary: List API keys
      operationId: listApiKeys
      security:
        - ApiKeyBearer: [keys:admin]
      responses:
        "200":
          description: All stored API key records (prefix + label only).
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKeyRecord"
    post:
      summary: Create API key
      operationId: createApiKey
      security:
        - ApiKeyBearer: [keys:admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label:
                  type: string
                  minLength: 1
                  maxLength: 64
                scopes:
                  type: array
                  items:
                    type: string
                    enum: [pairs:write, webhooks:write, keys:admin]
      responses:
        "201":
          description: Newly created key (raw value shown exactly once).
          content:
            application/json:
              schema:
                type: object
                required: [key, label]
                properties:
                  key:
                    type: string
                  label:
                    type: string
        "400":
          description: Invalid label or unknown scopes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/api-keys/{prefix}:
    parameters:
      - name: prefix
        in: path
        required: true
        description: First 8 characters of the key.
        schema:
          type: string
    delete:
      summary: Revoke API key
      operationId: revokeApiKey
      security:
        - ApiKeyBearer: [keys:admin]
      responses:
        "204":
          description: Key revoked.
        "404":
          description: Key not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/api-keys/{prefix}/rotate:
    parameters:
      - name: prefix
        in: path
        required: true
        description: First 8 characters of the key to rotate.
        schema:
          type: string
    post:
      summary: Rotate API key
      operationId: rotateApiKey
      security:
        - ApiKeyBearer: [keys:admin]
      responses:
        "201":
          description: New key minted; predecessor enters grace period.
          content:
            application/json:
              schema:
                type: object
                required: [key, label, graceExpiresAt]
                properties:
                  key:
                    type: string
                  label:
                    type: string
                  graceExpiresAt:
                    type: integer
        "404":
          description: Key not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/webhooks:
    get:
      summary: List webhooks
      operationId: listWebhooks
      security:
        - ApiKeyBearer: [webhooks:write]
      responses:
        "200":
          description: All registered webhooks.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookRecord"
    post:
      summary: Register webhook
      operationId: createWebhook
      security:
        - ApiKeyBearer: [webhooks:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                  maxLength: 2048
                events:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Webhook registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRecord"
        "400":
          description: Invalid url or events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /api/v1/webhooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Read webhook
      operationId: getWebhook
      responses:
        "200":
          description: Webhook record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRecord"
        "404":
          description: Webhook not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      summary: Update webhook events
      operationId: patchWebhook
      security:
        - ApiKeyBearer: [webhooks:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Updated webhook record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookRecord"
        "400":
          description: Invalid events array.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Webhook not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      summary: Delete webhook
      operationId: deleteWebhook
      security:
        - ApiKeyBearer: [webhooks:write]
      responses:
        "204":
          description: Webhook deleted.
        "404":
          description: Webhook not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

